<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Commande de produits - Bostanari Marianna</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Logo -->
<div class="logo-container">
  <img src="images/logo.jpg" alt="Logo Bostanari Marianna" class="logo">
</div>

<h1>Commande de produits</h1>

<form id="formCommande">

<div class="ligne-formulaire">

<div class="form-group">
<label>Société</label>
<input type="text" value="Bostanari Marianna" readonly>
</div>

<div class="form-group">
<label>Chantier</label>
<select id="chantier" required>
<option value="">-- Sélectionner --</option>
</select>
</div>

<div class="form-group">
<label>Votre nom</label>
<input type="text" id="nom" required>
</div>

</div>

<div id="produits"></div>

<div class="form-group">
<label>Autre demande</label>
<textarea id="autre"></textarea>
</div>

<button type="submit">Envoyer la commande</button>

<script src="app.js"></script>

</body>
</html>
